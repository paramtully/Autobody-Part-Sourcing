name: CI

on:
  [push, pull_request]

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  app:
    name: App Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root
      
      - name: Run lint
        run: npm run -ws --if-present lint

      - name: Run typecheck
        run: npm run -ws --if-present typecheck

      # - name: Run tests
      #   run: npm test -- --ci --verbose
      
      - name: Run build
        run: npm run -ws --if-present build

      # Fail on high-severity vulnerabilities in production deps only
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev || true

  live-tests:
    name: Live integration tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      LIVE_TESTS: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      # Supabase direct URLs (db.*.supabase.co) resolve to IPv6 only; GitHub Actions is IPv4-only.
      - name: Validate DATABASE_URL is IPv4-compatible
        run: |
          if echo "$DATABASE_URL" | grep -qE '@db\.[^./]+\.supabase\.co'; then
            echo "::error::DATABASE_URL uses Supabase direct connection (db.<ref>.supabase.co), which is IPv6-only and unreachable from GitHub Actions."
            echo "Set the production environment secret to a Supavisor pooler URL (Supabase Dashboard → Connect → Session or Transaction pooler)."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run live integration tests
        run: npm run test:live
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EBAY_API_KEY: ${{ secrets.EBAY_API_KEY }}
          EBAY_API_SECRET: ${{ secrets.EBAY_API_SECRET }}
          EBAY_USER_REFRESH_TOKEN: ${{ secrets.EBAY_USER_REFRESH_TOKEN }}
          EBAY_RU_NAME: ${{ secrets.EBAY_RU_NAME }}

  infra:
    name: Infrastructure Validation

    if: >-
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'

    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
    
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - name: Check terraform formatting
        run: terraform fmt -check

      - name: Initialize Terraform providers
        run: terraform init -backend=false

      - run: terraform validate
