name: CI

on:
  [push, pull_request]

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  app:
    name: App Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root
      
      - name: Run lint
        run: npm run -ws --if-present lint

      - name: Run typecheck
        run: npm run -ws --if-present typecheck

      - name: Run tests
        run: npm run -ws --if-present test
      
      - name: Run build
        run: npm run -ws --if-present build

      # Fail on high-severity vulnerabilities in production deps only
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev || true

  infra:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3

      - name: Check terraform formatting
        run: terraform fmt -check

      - run: terraform validate
