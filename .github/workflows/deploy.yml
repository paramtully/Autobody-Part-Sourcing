name: Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Prevent concurrent deploys; never cancel an in-flight deploy
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write  # required for OIDC -> AWS
  contents: read

env:
  AWS_REGION: us-west-2
  TF_VAR_aws_region: us-west-2
  TF_VAR_github_owner: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}
  NODE_VERSION: 20

jobs:
  # ── Package-aware change detection (commit that passed CI vs parent) ─────────
  changes:
    name: Detect changes
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      deploy_migrate: ${{ steps.filter.outputs.deploy_migrate }}
      deploy_api: ${{ steps.filter.outputs.deploy_api }}
      deploy_client: ${{ steps.filter.outputs.deploy_client }}
      deploy_listing_lambda: ${{ steps.filter.outputs.deploy_listing_lambda }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # paths-filter on detached HEAD + base/ref SHAs runs merge-base and fails (git 128).
      # Same branch for base and ref diffs against the previous commit on that branch.
      - name: Attach CI commit to branch
        run: git checkout -B "${{ github.event.workflow_run.head_branch }}"

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_branch }}
          ref: ${{ github.event.workflow_run.head_branch }}
          filters: |
            infra:
              - 'infra/**'
            deploy_migrate:
              - 'src/db/**'
              - 'drizzle.config.ts'
              - 'package.json'
              - 'package-lock.json'
            deploy_api:
              - 'apps/api/**'
              - 'src/db/**'
              - 'src/ordering/**'
              - 'src/affiliate/**'
              - 'package.json'
              - 'package-lock.json'
            deploy_client:
              - 'apps/client/**'
              - 'package.json'
              - 'package-lock.json'
            deploy_listing_lambda:
              - 'apps/workers/listingWorker/**'
              - 'apps/workers/build.mjs'
              - 'src/db/**'
              - 'src/vendors/**'
              - 'package.json'
              - 'package-lock.json'

  # ── Terraform: AWS infra + Vercel projects/env (secrets flow GitHub → TF → Vercel)
  terraform:
    name: Terraform
    needs: changes
    if: >-
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.deploy_listing_lambda == 'true' ||
      needs.changes.outputs.deploy_api == 'true' ||
      needs.changes.outputs.deploy_client == 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_vercel_api_token: ${{ secrets.VERCEL_TOKEN }}
      TF_VAR_vercel_team_id: ${{ vars.VERCEL_ORG_ID }}
      TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_ebay_api_key: ${{ secrets.EBAY_API_KEY }}
      TF_VAR_ebay_api_secret: ${{ secrets.EBAY_API_SECRET }}
      TF_VAR_ebay_user_refresh_token: ${{ secrets.EBAY_USER_REFRESH_TOKEN }}
      TF_VAR_ebay_ru_name: ${{ secrets.EBAY_RU_NAME }}
      TF_VAR_ebay_epn_campid: ${{ secrets.EBAY_EPN_CAMPID }}
    outputs:
      listing_fns: ${{ steps.tf.outputs.listing_fns }}
      vercel_api_project_id: ${{ steps.tf.outputs.vercel_api_project_id }}
      vercel_client_project_id: ${{ steps.tf.outputs.vercel_client_project_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - run: terraform init

      # Projects created via `vercel link` before Terraform managed them — import by name once.
      - name: Import existing Vercel projects
        if: >-
          needs.changes.outputs.infra == 'true' ||
          needs.changes.outputs.deploy_api == 'true' ||
          needs.changes.outputs.deploy_client == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          APP="${TF_VAR_application:-autobody-part-sourcing}"
          TEAM="${{ vars.VERCEL_ORG_ID }}"
          import_if_missing() {
            local resource="$1" name="$2"
            if terraform state show "$resource" >/dev/null 2>&1; then
              echo "$resource already in state"
              return 0
            fi
            local url="https://api.vercel.com/v9/projects/${name}"
            [ -n "$TEAM" ] && url="${url}?teamId=${TEAM}"
            local id
            id=$(curl -sf -H "Authorization: Bearer ${VERCEL_TOKEN}" "$url" | jq -r '.id // empty') || true
            if [ -z "$id" ]; then
              echo "Project ${name} not in Vercel — Terraform will create it"
              return 0
            fi
            echo "Importing ${resource} (${id})"
            terraform import "$resource" "$id"
          }
          import_if_missing vercel_project.api "${APP}-api"
          import_if_missing vercel_project.client "${APP}-client"

      - name: Terraform apply
        if: needs.changes.outputs.infra == 'true'
        run: terraform apply -auto-approve

      - name: Sync Vercel projects and env vars
        if: >-
          needs.changes.outputs.deploy_api == 'true' ||
          needs.changes.outputs.deploy_client == 'true' ||
          needs.changes.outputs.infra == 'true'
        run: |
          terraform apply -auto-approve \
            -target=vercel_project.api \
            -target=vercel_project.client \
            -target=vercel_project_domain.api \
            -target=vercel_project_domain.client \
            -target=vercel_project_domain.client_www \
            -target=vercel_project_environment_variable.api_database_url \
            -target=vercel_project_environment_variable.api_domain_name \
            -target=vercel_project_environment_variable.api_ebay_epn_campid \
            -target=vercel_project_environment_variable.client_api_base_url

      - name: Refresh listing Lambda environment
        if: >-
          needs.changes.outputs.deploy_listing_lambda == 'true' &&
          needs.changes.outputs.infra != 'true'
        run: terraform apply -auto-approve -target=aws_lambda_function.listing

      - name: Export Terraform outputs
        id: tf
        shell: bash
        run: |
          set -euo pipefail
          echo "listing_fns<<EOF" >> "$GITHUB_OUTPUT"
          terraform output -json listing_fn_names >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if terraform output vercel_api_project_id >/dev/null 2>&1; then
            echo "vercel_api_project_id=$(terraform output -raw vercel_api_project_id)" >> "$GITHUB_OUTPUT"
            echo "vercel_client_project_id=$(terraform output -raw vercel_client_project_id)" >> "$GITHUB_OUTPUT"
          fi

  # ── DB migrations (schema / drizzle config / lockfile) ───────────────────────
  migrate:
    name: DB migrations
    needs: changes
    if: needs.changes.outputs.deploy_migrate == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --workspaces --include-workspace-root

      - name: Run migrations
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_MIGRATION_URL || secrets.DATABASE_URL }}

  # ── listingWorker Lambda (esbuild bundles @repo/db + @repo/vendors) ─────────
  lambdas:
    name: Deploy listing Lambdas
    needs: [changes, terraform, migrate]
    if: >-
      always() &&
      !cancelled() &&
      needs.changes.result == 'success' &&
      needs.terraform.result == 'success' &&
      needs.changes.outputs.deploy_listing_lambda == 'true' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --workspaces --include-workspace-root

      - run: node apps/workers/build.mjs listingWorker

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push listingWorker zip to every per-vendor Lambda
        env:
          LISTING_FNS: ${{ needs.terraform.outputs.listing_fns }}
        shell: bash
        run: |
          set -euo pipefail
          for fn in $(echo "$LISTING_FNS" | jq -r '.[]'); do
            echo "Deploying $fn"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://apps/workers/dist/listingWorker.zip \
              --publish
          done

  # ── Vercel: API (apps/api + @repo/db, ordering, affiliate) ─────────────────
  deploy-api:
    name: Deploy API
    needs: [changes, migrate, terraform]
    if: >-
      always() &&
      !cancelled() &&
      needs.changes.result == 'success' &&
      needs.terraform.result == 'success' &&
      needs.changes.outputs.deploy_api == 'true' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Bundle API for serverless
        run: npm run build -w api

      # Repo root only (never working-directory: apps/api). root_directory is apps/api in Terraform.
      # vercel build writes apps/api/.vercel/output; plain --prebuilt deploy doubles that path — use --archive=tgz.
      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_api_project_id }}

      - name: Build API
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_api_project_id }}

      - name: Deploy API
        run: |
          set -euo pipefail
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee deploy-api.log
          echo "::notice::Vercel deployment log saved to deploy-api.log (open the Inspect URL in the log if this step is slow)"
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_api_project_id }}

  # ── Vercel: client (no @repo workspace deps) ─────────────────────────────────
  deploy-client:
    name: Deploy Client
    needs: [changes, terraform]
    if: >-
      always() &&
      !cancelled() &&
      needs.changes.result == 'success' &&
      needs.terraform.result == 'success' &&
      needs.changes.outputs.deploy_client == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      # Same monorepo prebuilt rules as deploy-api (root_directory apps/client in Terraform).
      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_client_project_id }}

      - name: Build Client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_client_project_id }}

      - name: Deploy Client
        run: |
          set -euo pipefail
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee deploy-client.log
          echo "::notice::Vercel deployment log saved to deploy-client.log (open the Inspect URL in the log if this step is slow)"
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.terraform.outputs.vercel_client_project_id }}

  # ── Post-deploy smoke checks (URLs derived from DOMAIN_NAME) ─────────────────
  healthcheck:
    name: Production health checks
    needs: [deploy-api, deploy-client, lambdas]
    if: >-
      always() &&
      !cancelled() &&
      (needs.deploy-api.result == 'success' ||
       needs.deploy-client.result == 'success')
    runs-on: ubuntu-latest
    # DOMAIN_NAME is set on the production environment; vars are not visible without this.
    environment: production
    env:
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      DEPLOYED_API: ${{ needs.deploy-api.result == 'success' }}
      DEPLOYED_CLIENT: ${{ needs.deploy-client.result == 'success' }}
    steps:
      - name: Require DOMAIN_NAME for smoke checks
        if: env.DEPLOYED_API == 'true' || env.DEPLOYED_CLIENT == 'true'
        run: |
          set -euo pipefail
          if [ -z "${DOMAIN_NAME}" ]; then
            echo "::error::DOMAIN_NAME is not set on the production environment (or repository variables). Smoke checks cannot run."
            exit 1
          fi

      - name: Verify API health
        if: env.DEPLOYED_API == 'true'
        run: |
          set -euo pipefail
          url="https://api.${DOMAIN_NAME}/health"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$url"; then
              echo "OK $url"
              exit 0
            fi
            echo "Attempt ${attempt}/5 failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::API health check failed: $url"
          exit 1

      - name: Verify frontend reachable
        if: env.DEPLOYED_CLIENT == 'true'
        run: |
          set -euo pipefail
          url="https://${DOMAIN_NAME}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --output /dev/null "$url"; then
              echo "OK $url"
              exit 0
            fi
            echo "Attempt ${attempt}/5 failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Frontend check failed: $url"
          exit 1
